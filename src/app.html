<!doctype html>
<html lang="pl" data-theme="songbook-dawn">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/logo.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/logo.png" />
		<link
			rel="manifest"
			href="%sveltekit.assets%/manifest.webmanifest"
			crossorigin="use-credentials"
		/>
		<meta name="theme-color" content="#93725f" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			(() => {
				const storageKey = 'songbook-theme';
				const resolveTheme = (preference) => {
					if (preference === 'light' || preference === 'dark') return preference;
					return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				};

				let preference = 'system';
				try {
					const stored = window.localStorage.getItem(storageKey);
					if (stored) {
						const parsed = JSON.parse(stored);
						if (parsed === 'light' || parsed === 'dark' || parsed === 'system') {
							preference = parsed;
						}
					}
				} catch {}

				const resolvedTheme = resolveTheme(preference);
				const isDark = resolvedTheme === 'dark';
				const root = document.documentElement;
				root.dataset.theme = isDark ? 'songbook-dusk' : 'songbook-dawn';
				root.dataset.colorMode = resolvedTheme;
				root.style.colorScheme = resolvedTheme;
				root.classList.toggle('theme-dark', isDark);
				root.classList.toggle('theme-light', !isDark);

				const themeMeta = document.querySelector("meta[name='theme-color']");
				if (themeMeta) {
					themeMeta.setAttribute('content', isDark ? '#141216' : '#93725f');
				}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
